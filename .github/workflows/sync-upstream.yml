name: Sync fork from upstream

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Save protected files
        run: |
          mkdir -p /tmp/protected/.github/workflows
          cp api.py /tmp/protected/api.py || true
          cp frontend/src/Chatwidget.tsx /tmp/protected/Chatwidget.tsx || true
          cp frontend/src/ChatWidget.tsx /tmp/protected/ChatWidget.tsx || true
          cp .github/workflows/*.yml /tmp/protected/.github/workflows/ || true

      - name: Add upstream
        run: |
          git remote add upstream https://github.com/mmdanielewicz/SDP-Group-37.git || true
          git fetch upstream

      - name: Sync main from upstream
        run: |
          git checkout main
          git reset --hard upstream/main

      - name: Restore protected files
        run: |
          mkdir -p .github/workflows
          cp /tmp/protected/api.py api.py || true
          cp /tmp/protected/Chatwidget.tsx frontend/src/Chatwidget.tsx || true
          cp /tmp/protected/ChatWidget.tsx frontend/src/ChatWidget.tsx || true
          cp /tmp/protected/.github/workflows/*.yml .github/workflows/ || true

      - name: Commit changes if needed
        run: |
          git add .
          git diff --cached --quiet || git commit -m "sync upstream and preserve deployment config"

      - name: Push to fork
        run: |
          git push origin main --force